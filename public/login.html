<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | Airbnb Clone</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 500px; margin: 100px auto; padding: 30px; border: 1px solid #ddd; border-radius: 12px; }
        .auth-title { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .auth-btn { width: 100%; background: var(--primary-color); color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body>
    <div class="auth-container">
        <h1 class="auth-title">Log in to Airbnb</h1>
        <form id="loginForm">
            <div class="form-group"><input type="email" id="email" placeholder="Email" required></div>
            <div class="form-group"><input type="password" id="password" placeholder="Password" required></div>
            <button type="submit" class="auth-btn">Log In</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">Don't have an account? <a href="signup.html">Sign up</a></p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const res = await fetch('/api/v1/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if(data.status === 'success') {
                window.location.href = 'index.html';
            } else {
                alert(data.message);
            }
        });
    </script>
</body>
</html>
